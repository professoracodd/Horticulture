<title>Merced College Plant Sale — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --surface: #fffdf8;
    --border: #d6d0c4;
    --border-light: #e8e3d8;
    --text: #2a2620;
    --text-muted: #7a7268;
    --text-faint: #a8a098;
    --accent: #4a7c59;

    --lc-c-bg: #f5d96b;
    --lc-c-text: #5a4500;
    --lc-e-bg: #b8d98d;
    --lc-e-text: #2a4a18;
    --lc-o-bg: #f0ede6;
    --lc-o-text: #4a4640;
    --lc-o-border: #c8c3b8;
    --lc-s-bg: #7ecfbc;
    --lc-s-text: #0d4a3a;
    --ca-bg: #ddefd4;
    --ca-text: #2a4a18;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  header p {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .legend-dot {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  input[type="text"], select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    height: 34px;
  }

  input[type="text"] { flex: 1; min-width: 200px; }
  select { min-width: 160px; cursor: pointer; }

  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }

  .stats {
    margin-left: auto;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat {
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .stat strong {
    display: block;
    font-size: 18px;
    font-family: 'Fraunces', serif;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .table-wrap {
    padding: 1.5rem 2rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  thead {
    background: #edeae2;
  }

  th {
    text-align: left;
    padding: 9px 12px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.1s;
  }

  th:hover { color: var(--text); }
  th.sort-asc::after { content: ' ↑'; }
  th.sort-desc::after { content: ' ↓'; }

  td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border-light);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tbody tr:hover td {
    background: #f7f4ec;
  }

  .botanical {
    font-style: italic;
    color: var(--text-muted);
    font-size: 11px;
  }

  .loc {
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.04em;
  }

  .qty {
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    font-family: 'DM Mono', monospace;
  }

  .lc-c { background: var(--lc-c-bg); color: var(--lc-c-text); }
  .lc-e { background: var(--lc-e-bg); color: var(--lc-e-text); }
  .lc-o { background: var(--lc-o-bg); color: var(--lc-o-text); border: 1px solid var(--lc-o-border); }
  .lc-s { background: var(--lc-s-bg); color: var(--lc-s-text); }
  .ca { background: var(--ca-bg); color: var(--ca-text); }

  .water { color: var(--text-muted); font-size: 11px; }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--text-faint);
    font-style: italic;
  }

  @media (max-width: 768px) {
    header, .controls, .table-wrap { padding-left: 1rem; padding-right: 1rem; }
    .stats { display: none; }
    th:nth-child(2), td:nth-child(2),
    th:nth-child(7), td:nth-child(7) { display: none; }
  }
</style>
</head>

<header>

  <p>Inventory — 23,738 plants</p>

</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search name, location…" />
  <select id="lcFilter">
    <option value="">All categories</option>
    <option value="C">C — Custom / Corn</option>

    <option value="O">O — Ornamentals</option>
    <option value="S">S — Succulents</option>

  </select>
  <select id="caFilter">
    <option value="">Cal native: all</option>
    <option value="CA">CA natives only</option>
  </select>
  <select id="sortMode">
    <option value="customer">Sort: by bench (customer)</option>
    <option value="staff">Sort: by label code (staff)</option>
  </select>
  <div class="stats">
    <div class="stat"><strong id="statRows">—</strong>items</div>
    <div class="stat"><strong id="statQty">—</strong>total qty</div>
  </div>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th data-col="common">Common name</th>
      <th data-col="botanical">Botanical name</th>
      <th data-col="size">Size</th>
      <th data-col="location">Location</th>
      <th data-col="qty">Qty</th>
      <th data-col="lc">LC</th>
      <th data-col="water">Water</th>
      <th data-col="ca">Cal native</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

const cols = ["common","botanical","size","location","qty","lc","water","ca"];
let sortCol = "default", sortDir = 1, sortMode = "customer";

function locSort(a, b) {
  if (sortMode === "customer") {
    const order = {"C":0,"E":1,"O":2,"S":3};
    const la = order[a[5]]??9, lb = order[b[5]]??9;
    if (la !== lb) return la - lb;
    const locA = a[3].toUpperCase(), locB = b[3].toUpperCase();
    if (locA !== locB) {
      const numA = parseInt(locA.replace(/[^0-9]/g,''))||0;
      const numB = parseInt(locB.replace(/[^0-9]/g,''))||0;
      const prefA = locA.replace(/[0-9]/g,''), prefB = locB.replace(/[0-9]/g,'');
      if (prefA !== prefB) return prefA.localeCompare(prefB);
      return numA - numB;
    }
    return a[0].localeCompare(b[0]);
  } else {
    const lcOrder = {"C":0,"E":1,"O":2,"S":3};
    const la = lcOrder[a[5]]??9, lb = lcOrder[b[5]]??9;
    if (la !== lb) return la - lb;
    return a[0].localeCompare(b[0]);
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const lc = document.getElementById('lcFilter').value;
  const sz = document.getElementById('sizeFilter').value;
  const ca = document.getElementById('caFilter').value;
  sortMode = document.getElementById('sortMode').value;

  let rows = raw.filter(r => {
    if (lc && r[5] !== lc) return false;
    if (sz && r[2] !== sz) return false;
    if (ca && r[7] !== 'CA') return false;
    if (q) {
      if (!(r[0]+' '+r[1]+' '+r[3]).toLowerCase().includes(q)) return false;
    }
    return true;
  });

  if (sortCol === "default") {
    rows.sort(locSort);
  } else {
    const ci = cols.indexOf(sortCol);
    rows.sort((a,b) => {
      let av = a[ci], bv = b[ci];
      if (typeof av === 'number') return sortDir*(av-bv);
      return sortDir*String(av).localeCompare(String(bv));
    });
  }

  document.getElementById('statRows').textContent = rows.length.toLocaleString();
  document.getElementById('statQty').textContent = rows.reduce((s,r)=>s+r[4],0).toLocaleString();

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No plants match your filters</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const lcClass = 'lc-' + r[5].toLowerCase();
    const caTag = r[7]==='CA' ? '<span class="badge ca">CA</span>' : '';
    return `<tr>
      <td>${r[0]}</td>
      <td class="botanical">${r[1]}</td>
      <td>${r[2]}</td>
      <td class="loc">${r[3]}</td>
      <td class="qty">${r[4]}</td>
      <td><span class="badge ${lcClass}">${r[5]}</span></td>
      <td class="water">${r[6]}</td>
      <td>${caTag}</td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const c = th.dataset.col;
    if (sortCol === c) { sortDir *= -1; }
    else { sortCol = c; sortDir = 1; }
    document.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir===1?'sort-asc':'sort-desc');
    render();
  });
});

['search','lcFilter','sizeFilter','caFilter','sortMode'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { sortCol='default'; render(); });
});

render();
</script>
