<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenhouse Staging</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=IBM+Plex+Sans&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'IBM Plex Sans',sans-serif;
  color:#f5f0e8;
  background:#1a2e1a;
}

.hero {
  position:relative;
  height:100vh;
  overflow:hidden;
}

/* IMAGE */
.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.hero-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

h1 {
  font-family:'Playfair Display';
  font-size:3.5rem;
}

/* SCROLL */
.scroll {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  cursor:pointer;
  animation:bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform:translate(-50%,0); }
  50% { transform:translate(-50%,10px); }
}

</style>

</head>

<body>

<div class="hero">

  <!-- 🔥 FORCE IMAGE DISPLAY -->

  <img src="https://raw.githubusercontent.com/professoracodd/Horticulture/main/house-a.png">

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Greenhouse Staging</h1>
    <p>House A — Pad Side</p>
  </div>

  <div class="scroll" onclick="document.getElementById('sim').scrollIntoView({behavior:'smooth'})">
    ↓
  </div>

</div>

<section id="sim" style="padding:100px; text-align:center;">
<h2>If you see the photo above, it's fixed.</h2>
</section>

</body>
</html>
