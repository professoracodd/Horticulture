<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenhouse Staging</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=IBM+Plex+Sans&display=swap" rel="stylesheet">

<style>
body {
  background:#1a2e1a;
  color:#f5f0e8;
  font-family:'IBM Plex Sans',sans-serif;
  margin:0;
}

/* NAV */
nav {
  position:fixed;
  top:0; left:0; right:0;
  background:#1a2e1a;
  padding:10px 20px;
  border-bottom:1px solid #333;
  z-index:10;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

h1 { font-family:'Playfair Display'; }

/* 👇 SCROLL ARROW */
.scroll-indicator {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  opacity:0.7;
  cursor:pointer;
  animation:bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform:translate(-50%,0); }
  50% { transform:translate(-50%,10px); }
}

/* SECTIONS */
section {
  padding:80px 20px;
  max-width:900px;
  margin:auto;
}

/* STAGES */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

.stage-item {
  border:1px solid #444;
  padding:10px;
  opacity:.4;
}

/* 🔥 HEAT */
#H1, #H2 {
  border-color:#c0392b;
  color:#f5a89a;
}

.stage-item.active { opacity:1; }

/* AIRFLOW */
.airflow {
  margin-top:30px;
  background:#111;
  border:1px solid #444;
  padding:20px;
}

svg { width:100%; height:150px; }

.air { stroke:#7ec67a; stroke-width:3; opacity:0; }
.cool { stroke:#4fc3f7; stroke-width:3; opacity:0; }

.active-air { opacity:1; }
.active-cool { opacity:1; }

/* QUIZ */
.quiz-option {
  border:1px solid #555;
  padding:10px;
  margin:5px 0;
  cursor:pointer;
}

.correct { background:green; }
.wrong { background:red; }

</style>

</head>

<body>

<nav>Greenhouse Staging</nav>

<!-- HERO -->

<div class="hero">
  <div>
    <h1>Greenhouse Staging</h1>
    <p>Merced College House A</p>
  </div>

  <!-- 👇 DOWN ARROW -->

  <div class="scroll-indicator" onclick="scrollToSim()">
    ↓ Scroll
  </div>
</div>

<!-- SIMULATOR -->

<section id="simulator">
<h2>Simulator</h2>

<div id="temp" style="font-size:40px;">72</div>
<input type="range" id="slider" min="50" max="95" value="72">

<div class="stage-grid" id="grid"></div>

<div class="airflow">
<svg viewBox="0 0 500 150">
<rect x="20" y="20" width="460" height="110" fill="none" stroke="#666"/>

<line id="air1" class="air" x1="100" y1="75" x2="200" y2="75"/>
<line id="air2" class="air" x1="200" y1="75" x2="300" y2="75"/>
<line id="air3" class="air" x1="300" y1="75" x2="400" y2="75"/>

<line id="cool1" class="cool" x1="100" y1="95" x2="300" y2="95"/>
</svg>
</div>

</section>

<!-- QUIZ -->

<section>
<h2>Quiz</h2>
<p><strong>Answer based on Merced College House A design.</strong></p>
<div id="quiz"></div>
</section>

<script>

// smooth scroll
function scrollToSim(){
  document.getElementById('simulator').scrollIntoView({behavior:'smooth'});
}

// ===== STAGES =====
const stages = [
{ id:'H2', label:'H2: Heater full output' },
{ id:'H1', label:'H1: Heater low stage' },
{ id:'N',  label:'N: Circulation fans (HAF)' },
{ id:'C1', label:'C1: Ridge vent opens' },
{ id:'C2', label:'C2: Shade deploys' },
{ id:'C3', label:'C3: Fan 1 + Louvers (airflow begins)' },
{ id:'C4', label:'C4: Fan 2 (increase airflow)' },
{ id:'C5', label:'C5: Pads ON (cool air)' },
{ id:'C6', label:'C6: Continued cooling' }
];

// build grid
const grid=document.getElementById('grid');
stages.forEach(s=>{
  let d=document.createElement('div');
  d.className='stage-item';
  d.id=s.id;
  d.innerText=s.label;
  grid.appendChild(d);
});

// logic
function getStages(t){
  if(t<=56) return ['H2','H1'];
  if(t<=59) return ['H1'];
  if(t<76) return ['N'];

  let a=['C1'];
  if(t>=78) a.push('C2');
  if(t>=80) a.push('C3');
  if(t>=82) a.push('C4');
  if(t>=84) a.push('C5');
  if(t>=86) a.push('C6');
  return a;
}

const slider=document.getElementById('slider');
const temp=document.getElementById('temp');

function update(v){
  temp.innerText=v;
  const active=getStages(v);

  stages.forEach(s=>{
    document.getElementById(s.id).classList.toggle('active',active.includes(s.id));
  });

  // airflow
  document.getElementById('air1').classList.toggle('active-air', active.includes('C3'));
  document.getElementById('air2').classList.toggle('active-air', active.includes('C4'));
  document.getElementById('air3').classList.toggle('active-air', active.includes('C4'));
  document.getElementById('cool1').classList.toggle('active-cool', active.includes('C5'));
}

slider.oninput=e=>update(e.target.value);
update(72);

// ===== QUIZ =====
const questions=[
{
q:"When does airflow begin?",
options:["C1","C2","C3","C5"],
correct:2
},
{
q:"What happens at C4?",
options:["Pads","Fan 2 increases airflow","Heater","Vent"],
correct:1
},
{
q:"What does N represent?",
options:["Nothing","Circulation fans","Cooling","Heat"],
correct:1
},
{
q:"Why are pads at C5?",
options:["Cheap","Need airflow first","Heat","Replace fans"],
correct:1
},
{
q:"What is C6?",
options:["Start airflow","Pads","Maintain full cooling","Vent"],
correct:2
}
];

let i=0,score=0;

function render(){
  let q=questions[i];
  document.getElementById('quiz').innerHTML=
    `<p>${q.q}</p>`+
    q.options.map((o,idx)=>`<div class="quiz-option" onclick="ans(${idx})">${o}</div>`).join('');
}

function ans(idx){
  if(idx===questions[i].correct) score++;
  i++;
  if(i<questions.length) render();
  else document.getElementById('quiz').innerHTML=`<h3>Score: ${score}/${questions.length}</h3>`;
}

render();

</script>

</body>
</html>
