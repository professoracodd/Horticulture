<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenhouse Staging</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=IBM+Plex+Mono&family=IBM+Plex+Sans&display=swap" rel="stylesheet">

<style>
body {
  background:#1a2e1a;
  color:#f5f0e8;
  font-family:'IBM Plex Sans',sans-serif;
  margin:0;
}

/* NAV */
nav {
  position:fixed;
  top:0; left:0; right:0;
  background:#1a2e1a;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #333;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1 { font-family:'Playfair Display'; font-size:3rem; }

section {
  padding:80px 20px;
  max-width:900px;
  margin:auto;
}

/* SIM */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

.stage-item {
  border:1px solid #444;
  padding:10px;
  opacity:.4;
}

.stage-item.active { opacity:1; }

/* QUIZ */
.quiz-option {
  border:1px solid #555;
  padding:10px;
  margin:5px 0;
  cursor:pointer;
}

.correct { background:green; }
.wrong { background:red; }

</style>

</head>

<body>

<nav>
  <div>Greenhouse Staging</div>
</nav>

<div class="hero">
  <div>
    <h1>Greenhouse Staging</h1>
    <p>Merced College House A</p>
  </div>
</div>

<section>
<h2>Simulator</h2>

<div id="temp" style="font-size:40px;">72</div>
<input type="range" id="slider" min="50" max="95" value="72">

<div class="stage-grid" id="grid"></div>
</section>

<section>
<h2>Quiz</h2>
<p><strong>Answer the questions based on Merced College House A design.</strong></p>
<div id="quiz"></div>
</section>

<script>
// ===== STAGES =====
const stages = [
{ id:'H2', label:'H2: Heater full output' },
{ id:'H1', label:'H1: Heater low stage' },
{ id:'N',  label:'N: Circulation fans (HAF) running' },
{ id:'C1', label:'C1: Ridge vent opens (passive cooling)' },
{ id:'C2', label:'C2: Shade curtain deploys (reduce heat load)' },
{ id:'C3', label:'C3: Fan 1 ON (exhaust fan — creates negative pressure)' },
{ id:'C4', label:'C4: Louvers OPEN (air now actually moves)' },
{ id:'C5', label:'C5: Fan 2 ON (exhaust fan — increase exchange)' },
{ id:'C6', label:'C6: Pads ON (cool incoming air)' }
];

const grid = document.getElementById('grid');

stages.forEach(s=>{
  const d=document.createElement('div');
  d.className='stage-item';
  d.id=s.id;
  d.innerText=s.label;
  grid.appendChild(d);
});

// ===== LOGIC =====
function getStages(t){
  if(t<=56) return ['H2','H1'];
  if(t<=59) return ['H1'];
  if(t<76) return ['N'];

  let a=['C1'];
  if(t>=78) a.push('C2');
  if(t>=80) a.push('C3');
  if(t>=82) a.push('C4');
  if(t>=84) a.push('C5');
  if(t>=86) a.push('C6');
  return a;
}

const slider=document.getElementById('slider');
const temp=document.getElementById('temp');

function update(v){
  temp.innerText=v;
  const active=getStages(v);
  stages.forEach(s=>{
    document.getElementById(s.id).classList.toggle('active',active.includes(s.id));
  });
}

slider.oninput=e=>update(e.target.value);
update(72);

// ===== QUIZ =====
const questions = [
{
q:"What is the FIRST cooling response in House A?",
options:[
"Fan 1 turns on",
"Pads turn on",
"Ridge vent opens",
"Louvers open"
],
correct:2
},
{
q:"Why does Fan 1 (C3) turn on BEFORE louvers open (C4)?",
options:[
"To save electricity",
"To create negative pressure before airflow begins",
"Because louvers are slower",
"No reason"
],
correct:1
},
{
q:"What does N (Normal) represent?",
options:[
"No equipment running",
"Circulation (HAF) fans running continuously",
"Heaters only",
"Pads only"
],
correct:1
},
{
q:"What happens at C5?",
options:[
"Louvers open",
"Pads turn on",
"Second exhaust fan increases air exchange",
"Ridge vent opens"
],
correct:2
},
{
q:"Why are pads LAST (C6)?",
options:[
"They are cheapest",
"They need airflow already established",
"They heat the greenhouse",
"They run at night"
],
correct:1
}
];

let i=0,score=0;

function render(){
  const q=questions[i];
  document.getElementById('quiz').innerHTML=`
    <p>${q.q}</p>
    ${q.options.map((o,idx)=>`<div class="quiz-option" onclick="answer(${idx})">${o}</div>`).join('')}
  `;
}

function answer(idx){
  if(idx===questions[i].correct) score++;
  i++;
  if(i<questions.length) render();
  else document.getElementById('quiz').innerHTML=`<h3>Score: ${score}/${questions.length}</h3>`;
}

render();
</script>

</body>
</html>
