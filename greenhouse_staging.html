<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenhouse Staging</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --green-deep: #1a2e1a;
  --green-mid: #2d5a27;
  --green-bright: #4a8c3f;
  --green-light: #7ec67a;
  --green-pale: #c8e6c4;
  --cream: #f5f0e8;
  --warm-white: #faf8f4;
  --amber: #d4860a;
  --amber-light: #f5b53f;
  --cool-blue: #4a7fa5;
  --cool-blue-light: #a8d4f0;
  --heat-red: #c0392b;
  --heat-light: #f5a89a;
  --text-dark: #1a1f1a;
  --text-mid: #3d4a3d;
  --border: rgba(74, 140, 63, 0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--green-deep);
  color: var(--cream);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(26, 46, 26, 0.95);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  color: var(--green-light);
}

.nav-links {
  display: flex;
  gap: 0.25rem;
  list-style: none;
}

.nav-links a {
  padding: 0.35rem 0.75rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--green-pale);
  text-decoration: none;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 56px;
  text-align: center;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 4rem;
}

.hero-sub {
  max-width: 500px;
  margin: 1rem auto;
}

/* SECTION */
section {
  padding: 5rem 2rem;
  max-width: 1000px;
  margin: auto;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  margin-bottom: 1rem;
}

/* SIMULATOR */
.temp-value {
  font-size: 4rem;
}

.stage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.75rem;
  margin-top: 2rem;
}

.stage-item {
  padding: 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  opacity: 0.4;
}

.stage-item.active {
  opacity: 1;
}

/* QUIZ */
.quiz-option {
  padding: 0.75rem;
  border: 1px solid var(--border);
  margin-bottom: 0.5rem;
  cursor: pointer;
}

.quiz-option.correct { background: green; }
.quiz-option.wrong { background: red; }

footer {
  text-align: center;
  padding: 2rem;
  opacity: 0.5;
}
</style>

</head>

<body>

<nav>
  <div class="nav-logo">Greenhouse Staging</div>
  <ul class="nav-links">
    <li><a href="#simulator">Simulator</a></li>
    <li><a href="#quiz">Quiz</a></li>
  </ul>
</nav>

<div class="hero">
  <div>
    <h1 class="hero-title">Greenhouse Staging</h1>
    <p class="hero-sub">How controllers activate equipment in steps.</p>
  </div>
</div>

<section id="simulator">
  <h2 class="section-title">Simulator</h2>

  <div class="temp-value" id="temp">72</div>

  <input type="range" id="slider" min="50" max="95" value="72">

  <div class="stage-grid" id="grid"></div>
</section>

<section id="quiz">
  <h2 class="section-title">Quiz</h2>
  <div id="quiz-body"></div>
</section>

<footer>
  Greenhouse Staging
</footer>

<script>
// ===== SIMULATOR =====
const stages = ['H2','H1','N','C1','C2','C3','C4','C5','C6'];

const grid = document.getElementById('grid');
stages.forEach(s=>{
  const el = document.createElement('div');
  el.className='stage-item';
  el.id=s;
  el.textContent=s;
  grid.appendChild(el);
});

function getStages(t){
  if(t<=56) return ['H2','H1'];
  if(t<=59) return ['H1'];
  if(t<76) return ['N'];
  let a=['C1'];
  if(t>=78) a.push('C2');
  if(t>=80) a.push('C3');
  if(t>=82) a.push('C4');
  if(t>=84) a.push('C5');
  if(t>=86) a.push('C6');
  return a;
}

const slider = document.getElementById('slider');
const temp = document.getElementById('temp');

function update(v){
  temp.textContent=v;
  const active = getStages(v);
  stages.forEach(s=>{
    document.getElementById(s).classList.toggle('active',active.includes(s));
  });
}

slider.oninput=e=>update(e.target.value);
update(72);

// ===== QUIZ =====
const questions = [
{
  q:"What is C1?",
  options:["Fan","Pads","Vent","Heater"],
  correct:2
},
{
  q:"What is N?",
  options:["Off","Always on fans","Heat","Cooling"],
  correct:1
}
];

let i=0,score=0;

function render(){
  const q=questions[i];
  document.getElementById('quiz-body').innerHTML=`
    <p>${q.q}</p>
    ${q.options.map((o,idx)=>`<div class="quiz-option" onclick="ans(${idx})">${o}</div>`).join('')}
  `;
}

function ans(idx){
  if(idx===questions[i].correct) score++;
  i++;
  if(i<questions.length) render();
  else document.getElementById('quiz-body').innerHTML=`Score: ${score}/${questions.length}`;
}

render();
</script>

</body>
</html>
